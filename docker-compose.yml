services:
    portfolio-website:
      build: 
        context: /
        dockerfile: Dockerfile-frontend
      container_name: portfolio-website
      ports:
        - 80:80
      stdin_open: true
      tty: true
      volumes:
          - './frontend:/app'
          - 'node_modules:/app/node_modules'
          - './nginx:/etc/nginx/conf.d'
      environment:
          - CHOKIDAR_USEPOLLING=true
      restart: unless-stopped
volumes:
  node_modules: