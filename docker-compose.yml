services:
    portfolio-website:
      build: 
        context: ./frontend
        dockerfile: Dockerfile
      container_name: portfolio-website
      ports:
        - 80:80
      stdin_open: true
      tty: true
      volumes:
          - './frontend:/app'
          - node_modules:/app/node_modules
      environment:
          - CHOKIDAR_USEPOLLING=true
volumes:
  node_modules: