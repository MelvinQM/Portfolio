server {
  listen 80;
  server_name melvinmoes.com www.melvinmoes.com;
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl;
  server_name melvinmoes.com www.melvinmoes.com;

  ssl_certificate /etc/letsencrypt/live/melvinmoes.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/melvinmoes.com/privkey.pem;

  root /usr/share/nginx/html;
  index index.html;

  location / {
    try_files $uri /index.html;
  }

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
    allow all;
  }
}
